# List all lotto rounds, sorted by draw number descending
query ListLottoRounds @auth(level: PUBLIC) {
  lottoRounds(orderBy: [{ drwNo: DESC }]) {
    drwNo
    drwNoDate
    totSellamnt
    firstWinamnt
    firstPrzwnerCo
    drwtNo1
    drwtNo2
    drwtNo3
    drwtNo4
    drwtNo5
    drwtNo6
    bnusNo
    returnValue
    createdAt
  }
}

# Get a specific lotto round by its draw number
query GetLottoRoundByNo($drwNo: Int!) @auth(level: PUBLIC) {
  lottoRound(key: { drwNo: $drwNo }) {
    drwNo
    drwNoDate
    totSellamnt
    firstWinamnt
    firstPrzwnerCo
    drwtNo1
    drwtNo2
    drwtNo3
    drwtNo4
    drwtNo5
    drwtNo6
    bnusNo
    returnValue
    createdAt
  }
}

# Get the latest lotto round (highest drwNo)
query GetLatestLottoRound @auth(level: PUBLIC) {
  lottoRounds(orderBy: [{ drwNo: DESC }], limit: 1) {
    drwNo
    drwNoDate
    totSellamnt
    firstWinamnt
    firstPrzwnerCo
    drwtNo1
    drwtNo2
    drwtNo3
    drwtNo4
    drwtNo5
    drwtNo6
    bnusNo
    returnValue
    createdAt
  }
}
